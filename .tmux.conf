# 將 prefix 改成 M-SPC
unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

# Session 操作（Prefix + s）— 顯示選單並提示可用按鍵
bind -T prefix s display-menu -T "#[align=centre fg=yellow bold] Session " -x C -y S \
  "New Session"        c "new-session" \
  "List Sessions"      l "choose-tree -s" \
  "" \
  "Previous Session"   p "switch-client -p" \
  "Next Session"       n "switch-client -n" \
  "Last Session"       t "switch-client -l" \
  "" \
  "Rename Session"     r "command-prompt -I '#S' 'rename-session \"%%\"'" \
  "" \
  "Detach"             d "detach-client" \
  "Kill Session"       k "run-shell 'tmux switch-client -l 2>/dev/null; tmux kill-session -t #{session_name}'"

# Window 操作（Prefix + w）— 顯示選單並提示可用按鍵
bind -T prefix w display-menu -T "#[align=centre fg=yellow bold] Window " -x C -y S \
  "New Window"      c "new-window -a -t '{end}'" \
  "List Windows"    l "choose-window" \
  "" \
  "Previous Window" p "previous-window" \
  "Next Window"     n "next-window" \
  "" \
  "Rename Window"   r "command-prompt -I '#W' 'rename-window \"%%\"'" \
  "Kill Window"     w "kill-window"

set -g display-panes-time 5000

# Pane 操作（Prefix + p）— 顯示選單並提示可用按鍵
bind -T prefix p display-menu -T "#[align=centre fg=yellow bold] Pane " -x C -y S \
  "Split Right"     r "split-window -h" \
  "Split Left"      l "split-window -h -b" \
  "Split Down"      d "split-window -v" \
  "Split Up"        u "split-window -v -b" \
  "" \
  "Show Pane Numbers" j "display-panes" \
  "" \
  "Zoom Toggle"     z "resize-pane -Z" \
  "Kill Pane"       p "kill-pane" \
  "" \
  "Narrower  [-5]"  n "resize-pane -x '#{e|-:#{pane_width},5}'" \
  "Wider     [+5]"  w "resize-pane -x '#{e|+:#{pane_width},5}'" \
  "Taller    [+5]"  t "resize-pane -y '#{e|+:#{pane_height},5}'" \
  "Shorter   [-5]"  s "resize-pane -y '#{e|-:#{pane_height},5}'"

# Pane 大小調整（Prefix + 方向鍵，可連續按）
bind -r Left  resize-pane -L 2
bind -r Right resize-pane -R 2
bind -r Up    resize-pane -U 1
bind -r Down  resize-pane -D 1

# 切換到指定 Window（Prefix + 0-9）
bind -T prefix 0 select-window -t :0
bind -T prefix 1 select-window -t :1
bind -T prefix 2 select-window -t :2
bind -T prefix 3 select-window -t :3
bind -T prefix 4 select-window -t :4
bind -T prefix 5 select-window -t :5
bind -T prefix 6 select-window -t :6
bind -T prefix 7 select-window -t :7
bind -T prefix 8 select-window -t :8
bind -T prefix 9 select-window -t :9
